# ─── REGRAS DO SQUAD ──────────────────────────────────────────────────────────
squad_rules:
  - max_compositions_per_session: 3
  - require_brand_onboarding: false   # usa universal-default se nao informado
  - preview_before_render: true
  - fullsafe_on_edit: true
  - diretor_brabo_before_code: true   # spec visual obrigatoria em projetos 5+ cenas
  - brabo_os_mandatory: true          # os 10 Mandamentos sao lei em todo .tsx gerado

# ─── BRABO MOTION OS v9.0 — 10 MANDAMENTOS (resumo) ─────────────────────────
brabo_os:
  version: "9.0"
  doc: squads/zeus-motion/docs/brabo-motion-os-v9.md
  mandamentos:
    1: "Analise antes de animar — responda 5 perguntas por cena antes de escrever codigo"
    2: "Palavra por palavra — stagger 1-4f, NUNCA linha por linha"
    3: "Vocabulario de curvas — ENTRADA:out(cubic), SAIDA:in(exp), MORPH:inOut(cubic)"
    4: "Motion blur — ENTRADA blur 10-14px→0, SAIDA 0→15-25px"
    5: "Stagger e lei — nenhum grupo entra/sai junto, 2f entre elementos"
    6: "Direcoes opostas — saem esq. → entram da dir. (e assim por diante)"
    7: "Zero frames vazios — overlap 5-12f entre Sequences obrigatorio"
    8: "Background em corte seco — NUNCA translateX/Y no background"
    9: "Saida Quadrupla — posicao + blur + opacity + scale SEMPRE juntos"
    10: "Layouts variados — NUNCA mesma composicao em cenas consecutivas"

  primitivas:
    ci:      "clamped interpolate — NUNCA interpolate sem clamp"
    exitTo:  "saida quadrupla (posicao + blur + opacity + scale)"
    exitToNB: "saida sem blur (quando filho tem WebkitBackgroundClip:text)"
    mergeStyles: "combina CSSProperties de entrada + saida"
    BackgroundBase: "3 camadas obrigatorias (cor + radial + noise SVG)"
    AnimatedText: "palavra por palavra com stagger 1-4f"

  spring_configs:
    text:   "{ damping: 14, mass: 0.8 }"
    card:   "{ damping: 13, mass: 0.9 }"
    badge:  "{ damping: 12, mass: 0.7, stiffness: 120 }"
    icon:   "{ damping: 10, mass: 0.8, stiffness: 120 }"
    snappy: "{ damping: 18, mass: 0.6, stiffness: 200 }"
    bouncy: "{ damping: 8,  mass: 0.8, stiffness: 150 }"
    heavy:  "{ damping: 16, mass: 1.2 }"

  known_errors:
    ERRO1: "filter:blur() no parent QUEBRA WebkitBackgroundClip:text — usar exitToNB"
    ERRO2: "spring overdamped para blur (damping_ratio > 1.1) — blur nao some antes do frame 25"
    ERRO3: "exitTo() em wrapper de gradient text — usar exitToNB()"
    ERRO4: "sons gerados com tom puro sem ADSR — resultado robotico/feio"
    ERRO5: "timing de sons em triggers tecnicos, nao em momentos visuais"
    ERRO6: "retangulo solido reaparece apos correcao parcial — corrigir ARQUITETURA, nao sintoma"
    ERRO7: "audio triplo — ffmpeg map 0 inclui stream AAC embutido do Remotion — usar -map 0:v"
    ERRO8: "timing inventado sem silencedetect — gera 7+ iteracoes de sync desnecessarias"
    ERRO9: "estender cena alem do narr_end — cena errada visivel durante narracao de outra"
    ERRO10: "nao propagar cascata de timing — cenas posteriores desalinhadas"
    ERRO11: "cor de acento (ouro/teal) em todos os elementos — sem hierarquia visual, parece template generico. Correcao: acento em 1-2 elementos criticos, resto branco hierarquico"
    ERRO12: "timing 27s (810f) para 10 cenas com muito texto — texto passa rapido demais. Correcao: 142f/cena + 7f overlap = 1357f = 45.23s"
    ERRO13: "dizer 'abra o Studio' em vez de renderizar — usuario quer o arquivo .mp4, nao o servidor. Usar npx remotion render direto e entregar o caminho"
    ERRO14: "escala 0→110%→100% em qualquer elemento — classico bounce amador. Usar 0.96→1.00 no maximo"
    ERRO15: "movimento linear em elemento principal — usar Easing.out(Easing.cubic) ou inOut por padrao"
    ERRO16: "elemento aparecendo seco na tela sem fade+blur — toda entrada precisa de opacity+blur+y ou mascara"
    ERRO17: "blur ausente em transicoes de cena rapidas — blur proporcional a velocidade e obrigatorio"
    ERRO18: "excesso de movimento simultaneo — nenhuma cena pode ter todos os elementos entrando no mesmo frame"
    ERRO19: "texto pequeno com animacao exagerada — texto pequeno prioriza legibilidade, animacao discreta"

# ─── PROHIBICOES ABSOLUTAS ───────────────────────────────────────────────────
prohibicoes:
  audio:
    - "NUNCA usar Audio component dentro de composition Remotion"
    - "NUNCA -map 0 ou -map 0:a no ffmpeg com video do Remotion (inclui stream embutido)"
    - "NUNCA aecho ou delay filters no mixing (cria eco artificial)"
    - "SEMPRE -map 0:v + -map [out] no ffmpeg"
    - "SEMPRE verificar com ffprobe antes de entregar"

  timing:
    - "NUNCA definir SCENE_TIMING sem silencedetect na narracao"
    - "NUNCA estender cena alem do narr_end da narracao daquela cena"
    - "NUNCA EXIT_F + 18 > dur (animacao de saida excede Sequence)"
    - "NUNCA alterar dur de uma cena sem propagar cascata em todas as seguintes"
    - "NUNCA renderizar sem pre-render-validate.js passar"

  css:
    - "NUNCA filter:blur() em pai de elemento com WebkitBackgroundClip:text"
    - "NUNCA exitTo() em wrapper de gradient text (usar exitToNB)"
    - "NUNCA interpolate sem clamp (sempre usar primitiva ci())"
    - "NUNCA spring sem config declarada (usar SPRING.text, SPRING.card, etc)"
    - "NUNCA BackgroundBase com menos de 3 camadas"

  visual:
    - "NUNCA mesmo layout em cenas consecutivas"
    - "NUNCA texto abaixo de y=1200 (safe zone Reels)"
    - "NUNCA animacao de background com translateX/Y (corte seco apenas)"
    - "NUNCA gap entre Sequences (overlap 5-12f obrigatorio)"
    - "NUNCA linha inteira de texto entrando junto (palavra por palavra)"
    - "NUNCA inventar paleta no momento de codar — paleta vem do briefing do produto"
    - "NUNCA ouro ou teal em captacao Magna HT — usar paleta magna_bw_premium"
    - "NUNCA cor de acento em mais de 2 elementos por cena"
    - "NUNCA 810 frames para 10 cenas de captacao com texto longo — minimo 1357"

  movimento:
    - "NUNCA escala 0→110%→100% — bounce amador proibido"
    - "NUNCA wiggle, tremedeira ou shake decorativo"
    - "NUNCA overshoot visivel em qualquer elemento"
    - "NUNCA elemento aparecendo seco sem fade+blur combinados"
    - "NUNCA interpolacao linear em movimentos principais (usar easing curvo)"
    - "NUNCA blur ausente em transicoes de cena rapidas"
    - "NUNCA todos os elementos da cena entrando no mesmo frame"
    - "NUNCA zoom explosivo ou camera tremendo sem funcao narrativa"
    - "NUNCA letra pulando, quicando ou com efeito de mola"
    - "NUNCA card, texto ou objeto com bounce de escala passando de 1.0"
    - "NUNCA animacao parecida com template Canva ou PowerPoint animado"
    - "NUNCA movimento constante sem pausa — toda cena precisa respirar"

# ─── AGENTE DE ROTEIRO (OBRIGATORIO) ─────────────────────────────────────────
agente_roteiro:
  url: "https://gemini.google.com/gem/e47a6069b6d5"
  regra: >
    TODO roteiro de video motion DEVE ser gerado por este agente Gemini.
    Ele entrega roteiro detalhado: cena por cena, texto exato, direcao visual, timing previsto.
    PROIBIDO roteiro simples, amador ou criado sem este agente.
    O roteiro define o codigo. Roteiro fraco = video fraco.
  personalidade_visual_obrigatoria: >
    O roteiro DEVE definir a identidade visual completa do video antes de qualquer linha de codigo.
    Cada motion tem sua propria personalidade. Nao existe video generico.
    O agente de roteiro entrega obrigatoriamente:
      - Fonte principal e fontes de apoio (nao e sempre SF Pro — depende do projeto)
      - Paleta de cores (background, primaria, acentos, gradientes)
      - Estilo de movimento (snappy/fluido/cinematografico/agressivo/suave)
      - Estilo de arte (minimalista/maximalista/dark/light/neon/corporate/editorial)
      - Estilo de imagens (mockups, fotos, ilustracoes, 3D, iconografia, formas geometricas)
      - Atmosfera geral (tom emocional: urgente/inspirador/tecnico/luxuoso/direto)
  proibicao: >
    PROIBIDO iniciar o codigo sem que o roteiro tenha definido todos os itens acima.
    PROIBIDO assumir que o estilo e sempre Apple Minimalista preto/branco.
    O AgenteArquiteto v13 e referencia de ESTRUTURA e PROFISSIONALISMO, nao de estilo fixo.
    Cada video tem a sua propria identidade visual definida no roteiro.

# ─── PIPELINE VIDEO COM NARRADOR (obrigatorio, nao pular etapas) ─────────────
pipeline_video_narrado:
  etapa_0: "roteiro — agente Gemini: https://gemini.google.com/gem/e47a6069b6d5"
  etapa_1: "silencedetect na narracao — extrair timestamps exatos de cada segmento"
  etapa_2: "tabela cena x narracao — mapear segmentos para cenas"
  etapa_3: "calcular SCENE_TIMING matematicamente — EXIT_F = narr_end × 30 - from"
  etapa_4: "codar composition — primitivas BRABO, BackgroundBase 3 camadas"
  etapa_5: "pre-render-validate.js — nao renderizar se reprovado"
  etapa_6: "render draft — verificar visual (escala 0.5, jpeg 80%)"
  etapa_7: "render full quality — jpeg 95%, escala 1"
  etapa_8: "ffmpeg mixing — -map 0:v + -map [out], nunca -map 0"
  etapa_9: "ffprobe verificacao — 1 video + 1 audio stream"
  etapa_10: "entrega final"

