name: zeus-motion
version: "3.4.0"
description: >
  Squad de motion design profissional nivel After Effects com IA.
  Fundado no BRABO Motion OS v9.0 — sistema operacional de animacao com 10 Mandamentos.
  Pipeline completo: Diretor Brabo (spec visual) → Composition Builder (codigo) → Pre-render Gate (checklist) → Render.
  Animacoes cinematograficas, tipografia palavra-por-palavra, Saida Quadrupla, spring configs validadas.
  Tres estilos canonicos aprovados: AgenteArquiteto v13 (Apple Minimalista, narrador + trilha, 9 cenas),
  MagnaCaptura v5 (B&W Premium Magna, texto puro, 10 cenas, 45.23s),
  e MentoriaEstrutura21Dias v1 (Dark Luxury Tech Premium, narrador + trilha, 7 cenas).
  Inspetores de easing AE (3 agentes dedicados) + guardiao de entradas e saidas profissionais.

lead: zeus-motion-master
category: motion-design
domain: D2  # interno (uso da Magna e mentorados)

methodology: BRABO Motion OS v9.0
methodology_doc: squads/zeus-motion/docs/brabo-motion-os-v9.md
diretor_brabo_doc: squads/zeus-motion/docs/diretor-brabo-workflow.md
padrao_aprovado_doc: squads/zeus-motion/docs/padrao-aprovado-zeus-motion.md
guia_video_narrado_doc: squads/zeus-motion/docs/guia-video-narrado.md
post_mortem_doc: squads/zeus-motion/docs/post-mortem-agente-arquiteto.md
erros_remotion_doc: squads/zeus-motion/ERROS-REMOTION.md
validador_script: squads/zeus-motion/scripts/pre-render-validate.js
referencia_canonica: squads/zeus-motion/src/compositions/AgenteArquiteto/index.tsx

inherits_from:
  - squads/_core-team/squad.yaml

tech_stack:
  - remotion ^4
  - react 18
  - "@remotion/shapes"
  - "@remotion/motion-blur"
  - "@remotion/animated-emoji"
  - react-device-mockup
  - typescript

entry_point: squads/zeus-motion/
compositions_path: squads/zeus-motion/src/compositions/
modules_path: squads/zeus-motion/src/modules/
brand_path: squads/zeus-motion/src/brand/
brand_memory_path: squads/zeus-motion/brand-memory/
docs_path: squads/zeus-motion/docs/

output:
  default_format: VERTICAL
  default_fps: 30
  render_path: "~/Desktop/zeus-motion-render"

# ─── PIPELINE BRABO (ordem de execucao) ───────────────────────────────────────
pipeline:
  # ── FASE 0: NARRAÇÃO (obrigatória antes do brief se motion tem narrador) ──────
  0_narracao:
    condicao: se o motion tem narração (TTS ou arquivo de áudio)
    etapas:
      - gerar_audio: TTS via MiniMax ou Edge TTS → public/{nome}-narracao.mp3
      - silencedetect: "ffmpeg -i public/{nome}.mp3 -af silencedetect=noise=-35dB:duration=0.15 -f null - 2>&1"
      - mapear_timestamps: extrair inicio/fim de cada frase em segundos → converter para frames (x30)
      - gerar_scene_map: array de { from, dur, text } para cada segmento de áudio
    output: scene_map.json com timestamps exatos por cena — durationInFrames de TODA cena vem daqui

  # ── FASE 1: BRIEF (usa o scene_map como base) ─────────────────────────────────
  1_brief:
    agent: diretor-brabo
    input_obrigatorio: scene_map.json (gerado na fase 0, se houver narração)
    regras_de_texto:
      - max 5 palavras em fonte >= 52px por cena
      - se trecho narrado tem 8+ palavras: dividir em 2+ cenas dentro do mesmo intervalo de áudio
      - duração de cada cena = dur do scene_map (nunca inventar)
      - texto na tela = palavras sendo narradas naquele exato intervalo de frames
    output: spec visual completa (tabela cenas + especificacao por cena + transicoes)

  2_brand:
    agent: brand-configurator
    output: brand-memory atualizado (cores, fonte, estilo)

  3_build:
    agent: composition-builder
    output: arquivo .tsx da composition

  4_review:
    agents: [motion-reviewer, after-effects-technician, senior-quality-reviewer, profissionalismo]
    output: feedback tecnico e visual

  4b_easing_inspection:
    agents: [easing-inspector-entrada, easing-inspector-saida, easing-inspector-curvas]
    output: aprovacao das curvas AE (entradas, saidas, springs, stagger)

  4c_transition_quality:
    agents: [entrada-profissional, saida-profissional]
    output: certificacao zero-elemento-seco (toda entrada e saida tem blur+fade+movimento)

  4d_texto_sync:
    agent: texto-dinamico
    checks:
      - max 5 palavras em fonte >= 52px por cena
      - duração de cada cena vem do silencedetect
      - texto corresponde ao trecho narrado no intervalo
      - fonte minima 80px para texto de impacto
    output: certificacao texto-dinamico + sync-narracao aprovados

  5_gate:
    agent: pre-render-gate
    output: checklist BRABO aprovado (10 mandamentos)

  6_render:
    agent: render-engineer
    output: arquivo .mp4 no caminho solicitado

# ─── AGENTES (38 no total) ────────────────────────────────────────────────────
agents:
  # Tier 0 — Orquestracao e Direcao
  - zeus-motion-master          # orquestrador geral do squad
  - diretor-brabo               # spec visual completa antes do codigo (Diretor Brabo)
  - concept-director            # conceito narrativo e filosofia visual do projeto
  - narrative-architect         # estrutura dramatica das cenas
  - profissionalismo            # gatekeeper de qualidade premium — bloqueia se parecer template/amador

  # Tier 1 — Especialistas de Producao
  - composition-builder         # monta compositions completas (.tsx)
  - scene-director              # sequencia de cenas com Sequence/overlap
  - text-animator               # textos animados (BlurReveal, TypeWriter, palavra a palavra)
  - shape-drawer                # shapes SVG (setas, checkmarks, caixas, linhas)
  - background-artist           # fundos e overlays (BackgroundBase 3 camadas)
  - device-specialist           # mockups de dispositivos (iphone, android, ipad, browser)

  # Tier 2 — Especialistas de Tecnica
  - after-effects-technician    # tecnicas AE: orbit, dolly, crane, scanner, blur expand
  - motion-choreographer        # coreografia de multiplos elementos em cena
  - motion-primitives-specialist # primitivas BRABO: ci(), exitTo(), entryFrom(), mergeStyles()
  - typography-master           # hierarquia tipografica, TV scales, kerning, word-by-word
  - color-director              # paleta, gradientes, glow, noise layers
  - layout-engineer             # safe zones, grid, posicionamento por cena
  - ui-ux-designer              # interface de apps em mockups e demos

  # Tier 2.5 — Inspetores de Easing AE (3 agentes dedicados, rodam em todo review)
  - easing-inspector-entrada    # verifica entradas: out(cubic), blur proporcional, duracao por tamanho
  - easing-inspector-saida      # verifica saidas: in(exp), Saida Quadrupla completa, direcao oposta
  - easing-inspector-curvas     # verifica curvas globais: springs, stagger, ritmo, pausa por cena

  # Tier 2.6 — Guardioes de Transicao (zero elementos secos)
  - entrada-profissional        # certifica blur+fade+movimento em TODA entrada de elemento
  - saida-profissional          # certifica Saida Quadrupla em TODA saida de elemento

  # Tier 2.7 — Guardiao de Densidade de Texto
  - texto-dinamico              # max 5 palavras em fonte grande por cena; bloqueia parede de palavras

  # Tier 3 — Efeitos Especializados
  - pan-quente-director         # efeitos cinematograficos: counters, stamps, confetes, shake
  - celebration-specialist      # confeti, bounce-enter, impacto positivo
  - transition-master           # transicoes entre cenas (dip-to-black, zoom-punch, whip-pan)
  - background-motion-specialist # parallax, noise breathing, aurora, pulso radial
  - cursor-choreographer        # movimento de cursores animados
  - dataviz-animator            # graficos e metricas animadas (barras, linhas, contadores)
  - apple-style-enforcer        # padrao Apple Minimalista: contraste, precision, safe zone

  # Tier 4 — Suporte
  - brand-configurator          # onboarding e configuracao de marca no brand-memory
  - brand-identity-guardian     # garante consistencia visual com a marca ao longo da composition
  - format-adapter              # adapta entre formatos (vertical 9:16 / feed 1:1 / horizontal 16:9)
  - copy-layer-reviewer         # revisa copy nas compositions (acentuacao, legibilidade)

  # Tier 5 — Revisao e Entrega
  - motion-reviewer             # avalia qualidade visual e timing
  - senior-quality-reviewer     # revisao senior: mandamentos BRABO, saida quadrupla, stagger
  - pre-render-gate             # checklist BRABO completo antes do render
  - render-engineer             # configuracao e execucao do render (draft/full)
  - quality-gate-motion         # score final 0-100 antes de entregar ao usuario

  # Tier 6 — Agentes Anti-Erro e Anti-IA (obrigatorios, rodam antes de toda entrega)
  - motion-director             # revisa fluidez, easing, blur, transicao — bloqueia bounce/wiggle/shake
  - visual-consistency          # consistencia de paleta, tipografia, alinhamento entre cenas
  - caption-sync                # sincronia de legendas: timing, quebra, destaque, posicao
  - copy-clarity                # clareza da copy interna: frase curta, forte, sem cara de IA
  - narrative-flow              # progressao narrativa: começo, tensao, virada, conclusao, CTA
  - concept-guardian            # conceito visual vs estrategia: visual alinhado ao produto/marca
  - technical-remotion          # qualidade de codigo: tokens, clamp, helpers, spring configs
  - anti-ai-look                # detecta aparencia de IA: excesso de efeito, composicao generica, sem alma
  - error-hunter                # caca erros grosseiros: cortes, overflow, desalinhamento, typo
  - final-approval              # aprovacao final — so libera se TODOS os agentes tier 6 aprovarem

