# ─── MOTION TOKENS (importar em todo .tsx, nunca usar numeros magicos) ────────
motion_tokens:
  file: "src/motion-tokens.ts"
  doc:  "squads/zeus-motion/docs/padrao-aprovado-zeus-motion.md#parte-11"
  durations:  { fast: 12, medium: 24, slow: 40, scene: 60 }
  distance:   { tiny: 8, small: 16, medium: 28, large: 48 }
  scale:      { subtleIn: 0.97, normalIn: 0.98, subtleOut: 0.985, cameraIn: 1.04 }
  blur:       { none: 0, soft: 6, medium: 12, strong: 20, max: 30 }
  stagger:    { letter: 1.5, word: 3, line: 5, card: 4 }
  regra: >
    Todo interpolate de entrada usa MOTION.durations.medium (24f) por padrao.
    Todo blur de entrada usa MOTION.blur.medium (12px).
    Todo deslocamento usa MOTION.distance.small (16px) por padrao.
    Escala de entrada: MOTION.scale.subtleIn (0.97). NUNCA abaixo de 0.94 ou acima de 1.01.

# ─── ANTI AI LOOK (critico — roda automaticamente antes de toda entrega) ──────
anti_ai_look:
  doc: "squads/zeus-motion/docs/padrao-aprovado-zeus-motion.md#parte-12"
  sinais_de_bloqueio:
    - "tudo se mexendo ao mesmo tempo (falta de stagger e hierarquia)"
    - "excesso de elementos animados sem proposito"
    - "textos sem escala tipografica (todos no mesmo tamanho)"
    - "transicoes exageradas ou de pack de efeitos"
    - "cores inconsistentes entre cenas"
    - "legendas fora de timing com a fala"
    - "cards com visual de dashboard fake"
    - "fontes genericas sem relacao com o produto"
    - "visual bonito mas sem narrativa ou direcao"
    - "composicao que parece gerada por prompt, nao dirigida"
  agente_responsavel: anti-ai-look
  gate: "rodar antes de final-approval, bloquear se qualquer sinal detectado"

# ─── MOTION PHILOSOPHY v2 (obrigatorio em todo .tsx gerado) ──────────────────
motion_philosophy_v2:
  doc: squads/zeus-motion/docs/padrao-aprovado-zeus-motion.md#parte-10
  versao: "2.0"
  atualizado: "2026-05-18"

  principio_central: >
    Todo movimento deve ter aparencia de motion design premium criado no After Effects
    por motion designer experiente. Suave, fluido, intencional, maduro, elegante e
    cinematografico. Nunca amador, infantil, exagerado, robotico ou de template generico.

  entradas_padrao:
    opacity:   "0 → 1"
    blur:      "12px → 0px (ou 8px → 0px para subtil)"
    translate: "y +20px → 0px (ou direcional conforme fluxo da cena)"
    scale:     "0.97 → 1.00 (NUNCA abaixo de 0.95 ou acima de 1.02 para entrada)"
    easing:    "Easing.out(Easing.cubic)"
    duracao:   "14-22 frames para elementos principais"

  saidas_padrao:
    padrao:    "exitTo() — posicao + blur + opacity + scale (Saida Quadrupla)"
    opacity:   "1 → 0"
    blur:      "0px → 8px – 16px"
    translate: "na direcao oposta a entrada anterior"
    scale:     "1.00 → 0.985 – 0.99"
    easing:    "Easing.in(Easing.cubic)"

  escala_proibida:
    - "0 → 110% → 100%  (bounce amador classico)"
    - "0 → 105% → 100%  (variante proibida)"
    - "scale > 1.04 em entrada de qualquer elemento"

  escala_aceita:
    - "0.96 → 1.00  (padrao)"
    - "0.97 → 1.00  (subtil)"
    - "0.98 → 1.00  (quase imperceptivel)"
    - "1.00 → 1.04  (camera push lento em 60+ frames)"

  blur_por_velocidade:
    parado:      "0px"
    lento:       "1px – 4px"
    medio:       "4px – 10px"
    rapido:      "10px – 24px"
    transicao:   "ate 30px"

  easings_aprovados:
    - "Easing.out(Easing.cubic)    — saida com desaceleracao natural (padrao entradas)"
    - "Easing.inOut(Easing.cubic)  — entrada e saida suaves (padrao morphs)"
    - "Easing.in(Easing.cubic)     — aceleracao inicial (padrao saidas)"
    - "Easing.out(Easing.quad)     — saida delicada"
    - "Easing.inOut(Easing.sin)    — respiracao e loops"
    - "spring damping >= 12        — sem bounce visivel"

  ritmo_por_cena:
    frame_0_8:   "fundo ganha vida sutilmente"
    frame_6_18:  "elemento principal entra"
    frame_14_26: "titulo ou focal entra"
    frame_20_plus: "textos de apoio entram em stagger (3-5f entre cada)"
    pausa:       "cena respira antes da saida (minimo 20 frames sem movimento)"
    saida:       "EXIT_F inicia saida suave"

  checklist_revisao:
    - "zero bounce ou wiggle visivel"
    - "zero escala passando de 1.0 em entradas"
    - "zero elemento aparecendo seco sem fade+blur"
    - "zero transicao sem easing curvo"
    - "zero todos os elementos entrando no mesmo frame"
    - "texto legivel durante toda a animacao"
    - "movimento conduz o olhar para o elemento certo"
    - "resultado parece After Effects profissional"

# ─── QUALITY GATE ─────────────────────────────────────────────────────────────
quality_gate:
  min_score: 70
  checklist:
    - ci_on_all_interpolates     # NUNCA interpolate sem clamp
    - spring_configs_defined     # NUNCA spring sem config
    - word_by_word_text          # texto palavra por palavra (Mandamento 2)
    - stagger_1_to_4_frames      # stagger entre palavras de 1 a 4f
    - quadruple_exit             # toda saida: posicao + blur + opacity + scale
    - opposite_directions        # direcoes de saida/entrada sao opostas
    - sequences_with_overlap     # overlap 5-12f entre cenas
    - background_no_direction    # background sem animacao direcional
    - background_3_layers        # 3 camadas (cor + radial + noise)
    - varied_layouts             # layouts diferentes entre cenas consecutivas
    - no_blur_on_gradient_text   # quando filho tem gradient text: usar NB variants
    - zero_typescript_errors     # codigo compila sem erros
    - timing_natural             # animacoes nao parecem roboticas
    - brand_consistent           # cores e fontes da marca mantidas
    - safe_zone_respected        # conteudo dentro das safe zones
    - no_overflow                # nada cortado nas bordas
    - accent_correct             # textos com acentuacao perfeita
    # Motion Philosophy v2 gates (obrigatorios desde 3.2.0)
    - no_bounce_overshoot        # zero escala >1.0 em entrada, zero wiggle/bounce/tremida
    - blur_on_fast_moves         # blur presente em movimentos medios e rapidos
    - easing_is_curved           # nenhum movimento principal usa linear
    - elements_have_stagger      # nenhuma cena tem todos os elementos entrando no frame 0
    - pause_exists_per_scene     # toda cena tem beat de pausa antes da saida
    - fade_on_every_entry        # opacity+blur em toda entrada de elemento importante
    # Anti AI + Tier 6 gates (obrigatorios desde 3.3.0)
    - motion_tokens_used         # MOTION.* importado, zero numeros magicos para dur/blur/scale
    - no_ai_look                 # anti-ai-look aprovado
    - caption_synced             # caption-sync aprovado (se tiver legenda)
    - copy_clear                 # copy-clarity aprovado
    - narrative_flows            # narrative-flow aprovado
    - concept_aligned            # concept-guardian aprovado
    - code_clean                 # technical-remotion aprovado
    - error_free                 # error-hunter aprovado
    - final_approval_gate        # final-approval passou — BLOQUEIA entrega se nao
    # Novos gates de profissionalismo (v3.4.0)
    - profissionalismo_approved  # profissionalismo: nao parece template, nao e amador
    - easing_entrada_approved    # easing-inspector-entrada: out(cubic), blur proporcional
    - easing_saida_approved      # easing-inspector-saida: in(exp), Saida Quadrupla
    - easing_curvas_approved     # easing-inspector-curvas: springs, stagger, ritmo, pausa
    - zero_entradas_secas        # entrada-profissional: todo elemento tem blur+fade+movimento
    - zero_saidas_secas          # saida-profissional: toda saida tem os 4 componentes
    - texto_dinamico_approved    # texto-dinamico: max 5 palavras em fonte >= 52px, fonte min 80px para impacto
    - narracao_sync_approved     # texto-dinamico: cada cena mostra o texto narrado AGORA, dur vem do silencedetect
