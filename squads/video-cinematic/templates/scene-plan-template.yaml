    legenda:
      texto: "Texto da legenda (mesmo ou resumido)"
      palavras_destaque: []  # palavras em cor de destaque
    audio:
      texto_tts: "Texto exato para text-to-speech"
      pausa_antes: 0.2  # segundos
      pausa_depois: 0.3

  - id: 2
    tipo: DESENVOLVIMENTO
